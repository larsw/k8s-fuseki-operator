apiVersion: fuseki.apache.org/v1alpha1
kind: FusekiServer
metadata:
  name: example-fusekiserver
  namespace: default
spec:
  image: ghcr.io/example/fuseki:6.0.0
  datasetRefs:
    - name: example-dataset
  observability:
    metrics:
      service:
        annotations:
          prometheus.io/scrape: "true"
      serviceMonitor:
        labels:
          release: prometheus
    logging:
      podAnnotations:
        logs.example.com/enabled: "true"