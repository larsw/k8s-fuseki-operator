apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuseki-operator-controller-manager
  namespace: system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fuseki-operator
      control-plane: controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fuseki-operator
        control-plane: controller-manager
    spec:
      containers:
        - name: manager
          image: ghcr.io/example/fuseki-operator/controller:dev
          imagePullPolicy: IfNotPresent
          command:
            - /manager
          args:
            - --leader-elect
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: probes
