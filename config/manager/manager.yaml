apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuseki-operator-controller-manager
  namespace: fuseki-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fuseki-operator
      control-plane: controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fuseki-operator
        control-plane: controller-manager
    spec:
      serviceAccountName: fuseki-operator-controller-manager
      containers:
        - name: manager
          image: ghcr.io/larsw/k8s-fuseki-operator/controller:dev
          imagePullPolicy: IfNotPresent
          command:
            - /manager
          args:
            - --leader-elect
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: probes
            - containerPort: 9443
              name: webhook-server
          volumeMounts:
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
      volumes:
        - name: webhook-certs
          secret:
            secretName: fuseki-operator-webhook-serving-cert
            optional: true
