      service:
        name: fuseki-operator-webhook-service
        namespace: fuseki-system
        path: /validate-fuseki-apache-org-v1alpha1-changesubscription
    failurePolicy: Fail
    name: vchangesubscription.fuseki.apache.org
    rules:
      - apiGroups:
          - fuseki.apache.org
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
          - UPDATE
        resources:
          - changesubscriptions
    sideEffects: None