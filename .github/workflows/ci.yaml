name: ci

on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    branches:
      - main
      - release/**

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests
        run: make test
      - name: Run envtest suite
        run: make envtest

  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: azure/setup-helm@v4
      - name: Install operator-sdk
        run: bash ./hack/release/install-operator-sdk.sh
      - name: Verify generated release metadata is in sync
        run: make release-verify
      - name: Validate Helm packaging
        run: make helm-test
      - name: Validate OLM bundle
        run: make bundle-validate

  fuseki-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test Fuseki base image path
        run: make docker-smoke-fuseki
      - name: Smoke test RDF Delta image scaffold
        run: make docker-smoke-rdf-delta

  fuseki-ranger-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start Ranger stack
        run: bash ./hack/smoke/ranger-stack.sh up
      - name: Smoke test Fuseki Ranger integration path
        run: make docker-smoke-fuseki-ranger
      - name: Show Ranger stack logs on failure
        if: failure()
        run: bash ./hack/smoke/ranger-stack.sh logs
      - name: Stop Ranger stack
        if: always()
        run: bash ./hack/smoke/ranger-stack.sh down

  controller-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test controller image scaffold
        run: make docker-smoke-controller
