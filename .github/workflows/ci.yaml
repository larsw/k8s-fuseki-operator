name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Tidy modules
        run: go mod tidy
      - name: Run tests
        run: make test

  fuseki-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test Fuseki image scaffold
        run: make docker-smoke-fuseki
